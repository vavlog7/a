<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1020">

<title>FocusOS Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b1020;
    --card:#141b2d;
    --card2:#1a2338;
    --border:#283552;
    --accent:#5d7cff;
    --green:#24d48b;
    --red:#ff5b73;
    --yellow:#ffcc66;
    --text:#f3f6ff;
    --muted:#95a2c2;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    height:100%;
    -webkit-text-size-adjust:100%;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#0b1020,#10172a);
    color:var(--text);
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    padding-bottom:120px;
}

@supports(padding:max(0px)){
    body{
        padding-bottom:max(120px, env(safe-area-inset-bottom));
    }
}

.wrapper{
    max-width:1600px;
    margin:auto;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

.logo{
    font-size:34px;
    font-weight:800;
}

.logo span{
    color:var(--accent);
}

.grid{
    display:grid;
    grid-template-columns:340px 1fr 360px;
    gap:20px;
}

.card{
    background:rgba(20,27,45,.95);
    border:1px solid var(--border);
    border-radius:24px;
    padding:20px;
    backdrop-filter:blur(12px);
}

.section-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:18px;
}

input,
select,
button,
textarea{
    width:100%;
    border:none;
    outline:none;
    border-radius:16px;
    padding:15px;
    margin-top:12px;
    background:var(--card2);
    color:white;
    font-size:16px;
}

button{
    background:var(--accent);
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.secondary{
    background:#202c47;
}

.task{
    background:var(--card2);
    border-radius:18px;
    padding:16px;
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    border:1px solid transparent;
}

.task:hover{
    border-color:var(--accent);
}

.task.done{
    opacity:.65;
}

.task.done .task-name{
    text-decoration:line-through;
}

.task-left{
    flex:1;
}

.task-name{
    font-size:16px;
    font-weight:600;
}

.badges{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
}

.badge{
    padding:6px 12px;
    border-radius:100px;
    font-size:12px;
    font-weight:600;
}

.goal-badge{
    background:#24385e;
    color:#bdd0ff;
}

.habit-badge{
    background:#214333;
    color:#a3ffc8;
}

.progress{
    width:100%;
    height:10px;
    border-radius:20px;
    overflow:hidden;
    background:#0d1424;
    margin-top:14px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#5d7cff,#7ea0ff);
}

.goal{
    background:var(--card2);
    border-radius:18px;
    padding:16px;
    margin-top:14px;
}

.goal-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.stats{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.stat{
    background:var(--card2);
    border-radius:18px;
    padding:18px;
}

.stat-label{
    color:var(--muted);
    font-size:13px;
}

.stat-value{
    font-size:30px;
    font-weight:800;
    margin-top:10px;
}

.money-positive{
    color:var(--green);
}

.money-negative{
    color:var(--red);
}

.history-item{
    background:var(--card2);
    padding:12px;
    border-radius:14px;
    margin-top:10px;
}

.empty{
    opacity:.5;
    padding:20px 0;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
}

.tabs button{
    margin-top:0;
}

textarea{
    resize:none;
    min-height:120px;
}

.mobile-nav{
    display:none;
}

@media(max-width:1200px){

    .grid{
        grid-template-columns:1fr;
    }

}

@media(max-width:768px){

    body{
        padding:16px;
    }

    .wrapper{
        padding:0;
    }

    .topbar{
        position:sticky;
        top:0;
        z-index:50;
        padding-top:10px;
        backdrop-filter:blur(20px);
    }

    .logo{
        font-size:28px;
    }

    .stats{
        grid-template-columns:1fr 1fr;
    }

    .card{
        border-radius:22px;
        padding:18px;
    }

    input,
    select,
    button{
        min-height:54px;
    }

}

</style>

</head>

<body>

<div class="wrapper">

    <div class="topbar">

        <div>
            <div class="logo">
                Focus<span>OS</span>
            </div>

            <div id="todayDate"></div>
        </div>

        <div style="width:240px;">
            <input type="date" id="viewDate">
        </div>

    </div>

    <div class="stats">

        <div class="stat">
            <div class="stat-label">
                Выполнено сегодня
            </div>

            <div class="stat-value" id="doneToday">
                0
            </div>
        </div>

        <div class="stat">
            <div class="stat-label">
                Эффективность
            </div>

            <div class="stat-value" id="efficiency">
                0%
            </div>
        </div>

        <div class="stat">
            <div class="stat-label">
                Серия привычек
            </div>

            <div class="stat-value">
                🔥 <span id="streaks">0</span>
            </div>
        </div>

        <div class="stat">
            <div class="stat-label">
                Баланс наград
            </div>

            <div class="stat-value money-positive" id="moneyBalance">
                $0
            </div>
        </div>

    </div>

    <div class="grid" style="margin-top:20px;">

        <!-- LEFT -->
        <div>

            <div class="card">

                <div class="section-title">
                    🎯 Новая цель
                </div>

                <input id="goalInput" placeholder="Например: Запустить агентство">

                <button onclick="addGoal()">
                    Создать цель
                </button>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    📝 Новая задача
                </div>

                <input id="taskInput" placeholder="Название задачи">

                <select id="goalSelect"></select>

                <input type="date" id="taskDate">

                <select id="taskType">
                    <option value="task">Обычная задача</option>
                    <option value="habit">Привычка</option>
                </select>

                <button onclick="addTask()">
                    Добавить задачу
                </button>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    💰 Система наград
                </div>

                <div style="margin-bottom:10px;">
                    +$ за выполнение
                </div>

                <input type="number" id="rewardPlus" value="1">

                <div style="margin-top:16px; margin-bottom:10px;">
                    -$ за пропуск
                </div>

                <input type="number" id="rewardMinus" value="1">

            </div>

        </div>

        <!-- CENTER -->
        <div>

            <div class="card">

                <div class="section-title">
                    📋 Задачи на день
                </div>

                <div class="tabs">

                    <button class="secondary" onclick="setFilter('all')">
                        Все
                    </button>

                    <button class="secondary" onclick="setFilter('task')">
                        Задачи
                    </button>

                    <button class="secondary" onclick="setFilter('habit')">
                        Привычки
                    </button>

                </div>

                <div id="tasksList"></div>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    📆 План на неделю
                </div>

                <textarea id="weekPlan" placeholder="План на неделю..."></textarea>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    🗓 План на месяц
                </div>

                <textarea id="monthPlan" placeholder="План на месяц..."></textarea>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    📜 История дня
                </div>

                <div id="historyBox"></div>

            </div>

        </div>

        <!-- RIGHT -->
        <div>

            <div class="card">

                <div class="section-title">
                    🚀 Прогресс целей
                </div>

                <div id="goalsList"></div>

            </div>

        </div>

    </div>

</div>

<script>

let goals =
JSON.parse(localStorage.getItem('focusGoals')) || [];

let tasks =
JSON.parse(localStorage.getItem('focusTasks')) || [];

let filterMode = 'all';

const today =
new Date().toISOString().split('T')[0];

document.getElementById('todayDate')
.innerText = "Сегодня: " + today;

document.getElementById('viewDate').value = today;
document.getElementById('taskDate').value = today;

document.getElementById('weekPlan').value =
localStorage.getItem('weekPlan') || '';

document.getElementById('monthPlan').value =
localStorage.getItem('monthPlan') || '';

function save(){

    localStorage.setItem(
        'focusGoals',
        JSON.stringify(goals)
    );

    localStorage.setItem(
        'focusTasks',
        JSON.stringify(tasks)
    );

    localStorage.setItem(
        'weekPlan',
        document.getElementById('weekPlan').value
    );

    localStorage.setItem(
        'monthPlan',
        document.getElementById('monthPlan').value
    );
}

function addGoal(){

    const input =
    document.getElementById('goalInput');

    if(!input.value.trim()) return;

    goals.push({
        id:Date.now(),
        name:input.value
    });

    input.value='';

    save();

    renderGoals();
    renderGoalOptions();
}

function renderGoalOptions(){

    const select =
    document.getElementById('goalSelect');

    select.innerHTML =
    `<option value="">Без цели</option>`;

    goals.forEach(goal => {

        select.innerHTML += `
            <option value="${goal.id}">
                ${goal.name}
            </option>
        `;
    });
}

function addTask(){

    const taskInput =
    document.getElementById('taskInput');

    const goalSelect =
    document.getElementById('goalSelect');

    const taskDate =
    document.getElementById('taskDate');

    const taskType =
    document.getElementById('taskType');

    if(!taskInput.value.trim()) return;

    tasks.push({

        id:Date.now(),

        text:taskInput.value,

        goalId:goalSelect.value,

        type:taskType.value,

        createdAt:new Date().toISOString(),

        scheduledDates:[taskDate.value],

        completedDates:[],

        skippedDates:[],

        streak:0

    });

    taskInput.value='';

    save();

    renderAll();
}

function setFilter(mode){

    filterMode = mode;

    renderTasks();
}

function toggleTask(id){

    const date =
    document.getElementById('viewDate').value;

    tasks = tasks.map(task => {

        if(task.id === id){

            const alreadyDone =
            task.completedDates.includes(date);

            if(alreadyDone){

                task.completedDates =
                task.completedDates.filter(
                    d => d !== date
                );

                if(task.type === 'habit'){

                    task.streak =
                    Math.max(0, task.streak - 1);

                }

            }else{

                task.completedDates.push(date);

                if(task.type === 'habit'){

                    task.streak++;

                }

            }

        }

        return task;
    });

    save();

    renderAll();
}

function renderTasks(){

    const date =
    document.getElementById('viewDate').value;

    let filtered = tasks.filter(task =>
        task.scheduledDates.includes(date)
    );

    if(filterMode !== 'all'){

        filtered =
        filtered.filter(
            t => t.type === filterMode
        );

    }

    const container =
    document.getElementById('tasksList');

    if(filtered.length === 0){

        container.innerHTML = `
            <div class="empty">
                Нет задач
            </div>
        `;

        return;
    }

    container.innerHTML = '';

    filtered.forEach(task => {

        const goal =
        goals.find(
            g => g.id == task.goalId
        );

        const done =
        task.completedDates.includes(date);

        container.innerHTML += `

            <div class="task ${done ? 'done':''}">

                <div class="task-left">

                    <div class="task-name">
                        ${task.text}
                    </div>

                    <div class="badges">

                        ${
                            goal
                            ? `
                                <div class="badge goal-badge">
                                    🎯 ${goal.name}
                                </div>
                            `
                            : ''
                        }

                        ${
                            task.type === 'habit'
                            ? `
                                <div class="badge habit-badge">
                                    🔥 Серия:
                                    ${task.streak}
                                </div>
                            `
                            : ''
                        }

                    </div>

                </div>

                <div>

                    <input
                        type="checkbox"
                        ${done ? 'checked':''}
                        onchange="toggleTask(${task.id})"
                    >

                </div>

            </div>

        `;
    });
}

function renderGoals(){

    const container =
    document.getElementById('goalsList');

    if(goals.length === 0){

        container.innerHTML = `
            <div class="empty">
                Нет целей
            </div>
        `;

        return;
    }

    container.innerHTML='';

    goals.forEach(goal => {

        const related =
        tasks.filter(
            t => t.goalId == goal.id
        );

        let completed = 0;

        related.forEach(task => {

            completed +=
            task.completedDates.length;

        });

        let total = 0;

        related.forEach(task => {

            total +=
            task.scheduledDates.length;

        });

        const percent =
        total
        ? Math.round((completed / total) * 100)
        : 0;

        container.innerHTML += `

            <div class="goal">

                <div class="goal-top">

                    <div>
                        ${goal.name}
                    </div>

                    <div>
                        ${percent}%
                    </div>

                </div>

                <div class="progress">

                    <div
                        class="progress-bar"
                        style="width:${percent}%"
                    ></div>

                </div>

                <div style="margin-top:10px; color:var(--muted);">

                    ${completed} / ${total}
                    выполнено

                </div>

            </div>

        `;
    });
}

function renderHistory(){

    const date =
    document.getElementById('viewDate').value;

    const history =
    document.getElementById('historyBox');

    const completed =
    tasks.filter(task =>
        task.completedDates.includes(date)
    );

    const missed =
    tasks.filter(task =>
        task.scheduledDates.includes(date)
        &&
        !task.completedDates.includes(date)
    );

    history.innerHTML = `

        <div>

            <div style="margin-bottom:12px;">
                ✅ Выполнено
            </div>

            ${
                completed.length
                ? completed.map(t => `
                    <div class="history-item">
                        ${t.text}
                    </div>
                `).join('')
                : `
                    <div class="empty">
                        Нет выполненных задач
                    </div>
                `
            }

        </div>

        <div style="margin-top:24px;">

            <div style="margin-bottom:12px;">
                ❌ Не выполнено
            </div>

            ${
                missed.length
                ? missed.map(t => `
                    <div class="history-item">
                        ${t.text}
                    </div>
                `).join('')
                : `
                    <div class="empty">
                        Нет пропущенных задач
                    </div>
                `
            }

        </div>

    `;
}

function renderStats(){

    const date =
    document.getElementById('viewDate').value;

    let doneToday = 0;

    tasks.forEach(task => {

        if(
            task.completedDates.includes(date)
        ){
            doneToday++;
        }

    });

    document.getElementById('doneToday')
    .innerText = doneToday;

    let totalCompleted = 0;
    let totalScheduled = 0;

    tasks.forEach(task => {

        totalCompleted +=
        task.completedDates.length;

        totalScheduled +=
        task.scheduledDates.length;

    });

    const efficiency =
    totalScheduled
    ? Math.round(
        (totalCompleted / totalScheduled)
        * 100
    )
    : 0;

    document.getElementById('efficiency')
    .innerText = efficiency + '%';

    let streaks = 0;

    tasks.forEach(task => {

        if(task.type === 'habit'){

            streaks += task.streak;

        }

    });

    document.getElementById('streaks')
    .innerText = streaks;

    calculateMoney();
}

function calculateMoney(){

    const plus =
    Number(
        document.getElementById(
            'rewardPlus'
        ).value
    );

    const minus =
    Number(
        document.getElementById(
            'rewardMinus'
        ).value
    );

    let money = 0;

    tasks.forEach(task => {

        money +=
        task.completedDates.length * plus;

        const missed =
        task.scheduledDates.length
        -
        task.completedDates.length;

        money -= missed * minus;

    });

    const balance =
    document.getElementById('moneyBalance');

    balance.innerText =
    '$' + money;

    if(money >= 0){

        balance.classList.remove(
            'money-negative'
        );

        balance.classList.add(
            'money-positive'
        );

    }else{

        balance.classList.remove(
            'money-positive'
        );

        balance.classList.add(
            'money-negative'
        );

    }

}

function renderAll(){

    renderTasks();
    renderGoals();
    renderHistory();
    renderStats();

}

document.getElementById('viewDate')
.addEventListener('change', renderAll);

document.getElementById('weekPlan')
.addEventListener('input', save);

document.getElementById('monthPlan')
.addEventListener('input', save);

renderGoalOptions();
renderAll();

</script>

</body>
</html>
