<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1020">

<title>FocusOS Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b1020;
    --card:#141b2d;
    --card2:#1a2338;
    --border:#283552;
    --accent:#5d7cff;
    --green:#24d48b;
    --red:#ff5b73;
    --text:#f3f6ff;
    --muted:#95a2c2;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    -webkit-text-size-adjust:100%;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#0b1020,#10172a);
    color:var(--text);
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    padding-bottom:120px;
}

.wrapper{
    max-width:1700px;
    margin:auto;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

.logo{
    font-size:34px;
    font-weight:800;
}

.logo span{
    color:var(--accent);
}

.grid{
    display:grid;
    grid-template-columns:330px 1fr 360px;
    gap:20px;
}

.card{
    background:rgba(20,27,45,.96);
    border:1px solid var(--border);
    border-radius:24px;
    padding:20px;
}

.section-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:18px;
}

input,
select,
button{
    width:100%;
    border:none;
    outline:none;
    border-radius:16px;
    padding:15px;
    margin-top:12px;
    background:var(--card2);
    color:white;
    font-size:16px;
}

button{
    background:var(--accent);
    font-weight:700;
    cursor:pointer;
}

.secondary{
    background:#22304f;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
}

.stat{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
}

.stat-title{
    color:var(--muted);
    font-size:13px;
}

.stat-value{
    margin-top:10px;
    font-size:30px;
    font-weight:800;
}

.task{
    background:var(--card2);
    border-radius:18px;
    padding:16px;
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
}

.task.done{
    opacity:.65;
}

.task.done .task-name{
    text-decoration:line-through;
}

.task-left{
    flex:1;
}

.task-name{
    font-size:16px;
    font-weight:600;
}

.badges{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:10px;
}

.badge{
    padding:6px 12px;
    border-radius:100px;
    font-size:12px;
    font-weight:700;
}

.goal-badge{
    background:#243b63;
    color:#bfd0ff;
}

.habit-badge{
    background:#1f4735;
    color:#a4ffca;
}

.plan-task{
    background:var(--card2);
    border-radius:16px;
    padding:14px;
    margin-top:12px;
}

.goal{
    background:var(--card2);
    border-radius:18px;
    padding:16px;
    margin-top:14px;
}

.progress{
    width:100%;
    height:10px;
    border-radius:20px;
    background:#0f1628;
    overflow:hidden;
    margin-top:12px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#5d7cff,#8ba7ff);
}

.tabs{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:18px;
}

.empty{
    opacity:.5;
    padding:20px 0;
}

.money-positive{
    color:var(--green);
}

.money-negative{
    color:var(--red);
}

@media(max-width:1300px){

    .grid{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr 1fr;
    }

}

@media(max-width:768px){

    .wrapper{
        padding:14px;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .logo{
        font-size:28px;
    }

    input,
    select,
    button{
        min-height:54px;
    }

}

</style>

</head>

<body>

<div class="wrapper">

    <div class="topbar">

        <div>

            <div class="logo">
                Focus<span>OS</span>
            </div>

            <div id="todayText"></div>

        </div>

        <div style="width:240px;">
            <input type="date" id="viewDate">
        </div>

    </div>

    <div class="stats">

        <div class="stat">
            <div class="stat-title">
                Выполнено сегодня
            </div>

            <div class="stat-value" id="doneToday">
                0
            </div>
        </div>

        <div class="stat">
            <div class="stat-title">
                Эффективность
            </div>

            <div class="stat-value" id="efficiency">
                0%
            </div>
        </div>

        <div class="stat">
            <div class="stat-title">
                Серия привычек
            </div>

            <div class="stat-value">
                🔥 <span id="streaks">0</span>
            </div>
        </div>

        <div class="stat">
            <div class="stat-title">
                Баланс наград
            </div>

            <div class="stat-value money-positive" id="moneyBalance">
                $0
            </div>
        </div>

    </div>

    <div class="grid" style="margin-top:20px;">

        <!-- LEFT -->
        <div>

            <div class="card">

                <div class="section-title">
                    🎯 Создать цель
                </div>

                <input id="goalInput" placeholder="Например: Масштабировать агентство">

                <button onclick="addGoal()">
                    Создать цель
                </button>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    ➕ Добавить задачу
                </div>

                <input id="taskInput" placeholder="Название задачи">

                <select id="goalSelect"></select>

                <input type="date" id="taskDate">

                <select id="taskType">

                    <option value="task">
                        Обычная задача
                    </option>

                    <option value="habit">
                        Привычка (ежедневно)
                    </option>

                </select>

                <button onclick="addTask()">
                    Добавить
                </button>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    💰 Награды
                </div>

                <div style="margin-bottom:10px;">
                    +$ за выполнение
                </div>

                <input type="number" id="rewardPlus" value="1">

                <div style="margin-top:16px; margin-bottom:10px;">
                    -$ за пропуск
                </div>

                <input type="number" id="rewardMinus" value="1">

            </div>

        </div>

        <!-- CENTER -->
        <div>

            <div class="card">

                <div class="section-title">
                    📋 Задачи на день
                </div>

                <div class="tabs">

                    <button class="secondary" onclick="setFilter('all')">
                        Все
                    </button>

                    <button class="secondary" onclick="setFilter('task')">
                        Задачи
                    </button>

                    <button class="secondary" onclick="setFilter('habit')">
                        Привычки
                    </button>

                </div>

                <div id="tasksList"></div>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    📆 Планировщик
                </div>

                <input id="plannerTask" placeholder="Например: Сделать сайт">

                <select id="plannerGoal"></select>

                <input type="date" id="plannerDate">

                <button onclick="addPlannedTask()">
                    Запланировать
                </button>

                <div id="plannedTasks"></div>

            </div>

            <div class="card" style="margin-top:20px;">

                <div class="section-title">
                    📜 История дня
                </div>

                <div id="historyBox"></div>

            </div>

        </div>

        <!-- RIGHT -->
        <div>

            <div class="card">

                <div class="section-title">
                    🚀 Прогресс целей
                </div>

                <div id="goalsList"></div>

            </div>

        </div>

    </div>

</div>

<script>

let goals =
JSON.parse(localStorage.getItem('focusGoals')) || [];

let tasks =
JSON.parse(localStorage.getItem('focusTasks')) || [];

let filterMode = 'all';

const today =
new Date().toISOString().split('T')[0];

document.getElementById('todayText')
.innerText = "Сегодня: " + today;

document.getElementById('viewDate').value = today;
document.getElementById('taskDate').value = today;
document.getElementById('plannerDate').value = today;

function save(){

    localStorage.setItem(
        'focusGoals',
        JSON.stringify(goals)
    );

    localStorage.setItem(
        'focusTasks',
        JSON.stringify(tasks)
    );

}

function addGoal(){

    const input =
    document.getElementById('goalInput');

    if(!input.value.trim()) return;

    goals.push({
        id:Date.now(),
        name:input.value
    });

    input.value='';

    save();

    renderGoalOptions();
    renderGoals();
}

function renderGoalOptions(){

    const selects = [
        document.getElementById('goalSelect'),
        document.getElementById('plannerGoal')
    ];

    selects.forEach(select => {

        select.innerHTML =
        `<option value="">Без цели</option>`;

        goals.forEach(goal => {

            select.innerHTML += `
                <option value="${goal.id}">
                    ${goal.name}
                </option>
            `;
        });

    });

}

function addTask(){

    const taskInput =
    document.getElementById('taskInput');

    const goalSelect =
    document.getElementById('goalSelect');

    const taskDate =
    document.getElementById('taskDate');

    const taskType =
    document.getElementById('taskType');

    if(!taskInput.value.trim()) return;

    tasks.push({

        id:Date.now(),

        text:taskInput.value,

        goalId:goalSelect.value,

        type:taskType.value,

        recurring:
        taskType.value === 'habit',

        createdAt:new Date().toISOString(),

        scheduledDates:
        taskType.value === 'habit'
        ? []
        : [taskDate.value],

        completedDates:[],

        streak:0

    });

    taskInput.value='';

    save();

    renderAll();
}

function addPlannedTask(){

    const text =
    document.getElementById('plannerTask');

    const goal =
    document.getElementById('plannerGoal');

    const date =
    document.getElementById('plannerDate');

    if(!text.value.trim()) return;

    tasks.push({

        id:Date.now(),

        text:text.value,

        goalId:goal.value,

        type:'task',

        recurring:false,

        createdAt:new Date().toISOString(),

        scheduledDates:[date.value],

        completedDates:[],

        streak:0

    });

    text.value='';

    save();

    renderAll();
}

function shouldShowTask(task,date){

    if(task.recurring){
        return true;
    }

    return task.scheduledDates.includes(date);

}

function toggleTask(id){

    const date =
    document.getElementById('viewDate').value;

    tasks = tasks.map(task => {

        if(task.id === id){

            const done =
            task.completedDates.includes(date);

            if(done){

                task.completedDates =
                task.completedDates.filter(
                    d => d !== date
                );

                if(task.type === 'habit'){

                    task.streak =
                    Math.max(0, task.streak - 1);

                }

            }else{

                task.completedDates.push(date);

                if(task.type === 'habit'){

                    task.streak++;

                }

            }

        }

        return task;
    });

    save();

    renderAll();
}

function setFilter(mode){

    filterMode = mode;

    renderTasks();
}

function renderTasks(){

    const date =
    document.getElementById('viewDate').value;

    let filtered =
    tasks.filter(task =>
        shouldShowTask(task,date)
    );

    if(filterMode !== 'all'){

        filtered =
        filtered.filter(
            t => t.type === filterMode
        );

    }

    const container =
    document.getElementById('tasksList');

    if(filtered.length === 0){

        container.innerHTML = `
            <div class="empty">
                Нет задач
            </div>
        `;

        return;
    }

    container.innerHTML='';

    filtered.forEach(task => {

        const done =
        task.completedDates.includes(date);

        const goal =
        goals.find(
            g => g.id == task.goalId
        );

        container.innerHTML += `

            <div class="task ${done ? 'done':''}">

                <div class="task-left">

                    <div class="task-name">
                        ${task.text}
                    </div>

                    <div class="badges">

                        ${
                            goal
                            ? `
                                <div class="badge goal-badge">
                                    🎯 ${goal.name}
                                </div>
                            `
                            : ''
                        }

                        ${
                            task.type === 'habit'
                            ? `
                                <div class="badge habit-badge">
                                    🔁 Ежедневная привычка
                                </div>
                            `
                            : ''
                        }

                        ${
                            task.type === 'habit'
                            ? `
                                <div class="badge habit-badge">
                                    🔥 ${task.streak}
                                </div>
                            `
                            : ''
                        }

                    </div>

                </div>

                <div>

                    <input
                        type="checkbox"
                        ${done ? 'checked':''}
                        onchange="toggleTask(${task.id})"
                    >

                </div>

            </div>

        `;
    });

}

function renderGoals(){

    const container =
    document.getElementById('goalsList');

    if(goals.length === 0){

        container.innerHTML = `
            <div class="empty">
                Нет целей
            </div>
        `;

        return;
    }

    container.innerHTML='';

    goals.forEach(goal => {

        const related =
        tasks.filter(
            t => t.goalId == goal.id
        );

        let completed = 0;

        related.forEach(task => {

            completed +=
            task.completedDates.length;

        });

        const total =
        related.length || 1;

        const percent =
        Math.min(
            100,
            Math.round(
                (completed / total) * 100
            )
        );

        container.innerHTML += `

            <div class="goal">

                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                ">

                    <div>
                        ${goal.name}
                    </div>

                    <div>
                        ${percent}%
                    </div>

                </div>

                <div class="progress">

                    <div
                        class="progress-bar"
                        style="width:${percent}%"
                    ></div>

                </div>

                <div style="
                    margin-top:10px;
                    color:var(--muted);
                ">

                    Выполнений:
                    ${completed}

                </div>

            </div>

        `;
    });

}

function renderPlannedTasks(){

    const container =
    document.getElementById('plannedTasks');

    const planned =
    tasks.filter(
        t => !t.recurring
    );

    if(planned.length === 0){

        container.innerHTML = `
            <div class="empty">
                Нет запланированных задач
            </div>
        `;

        return;
    }

    container.innerHTML='';

    planned.sort((a,b)=>
        a.scheduledDates[0]
        >
        b.scheduledDates[0]
        ? 1 : -1
    );

    planned.forEach(task => {

        const goal =
        goals.find(
            g => g.id == task.goalId
        );

        container.innerHTML += `

            <div class="plan-task">

                <div style="
                    font-weight:700;
                ">
                    ${task.text}
                </div>

                <div style="
                    margin-top:8px;
                    color:var(--muted);
                    font-size:14px;
                ">

                    📅 ${task.scheduledDates[0]}

                </div>

                ${
                    goal
                    ? `
                        <div class="badges">

                            <div class="
                                badge goal-badge
                            ">
                                🎯 ${goal.name}
                            </div>

                        </div>
                    `
                    : ''
                }

            </div>

        `;
    });

}

function renderHistory(){

    const date =
    document.getElementById('viewDate').value;

    const history =
    document.getElementById('historyBox');

    const completed =
    tasks.filter(task =>
        shouldShowTask(task,date)
        &&
        task.completedDates.includes(date)
    );

    const missed =
    tasks.filter(task =>
        shouldShowTask(task,date)
        &&
        !task.completedDates.includes(date)
    );

    history.innerHTML = `

        <div>

            <div style="
                margin-bottom:12px;
                font-weight:700;
            ">
                ✅ Выполнено
            </div>

            ${
                completed.length
                ? completed.map(task => `
                    <div class="plan-task">
                        ${task.text}
                    </div>
                `).join('')
                : `
                    <div class="empty">
                        Нет выполненных задач
                    </div>
                `
            }

        </div>

        <div style="margin-top:24px;">

            <div style="
                margin-bottom:12px;
                font-weight:700;
            ">
                ❌ Не выполнено
            </div>

            ${
                missed.length
                ? missed.map(task => `
                    <div class="plan-task">
                        ${task.text}
                    </div>
                `).join('')
                : `
                    <div class="empty">
                        Нет пропущенных задач
                    </div>
                `
            }

        </div>

    `;
}

function renderStats(){

    const date =
    document.getElementById('viewDate').value;

    const todayTasks =
    tasks.filter(task =>
        shouldShowTask(task,date)
    );

    const done =
    todayTasks.filter(task =>
        task.completedDates.includes(date)
    ).length;

    document.getElementById('doneToday')
    .innerText = done;

    let totalCompleted = 0;

    tasks.forEach(task => {

        totalCompleted +=
        task.completedDates.length;

    });

    const efficiency =
    tasks.length
    ? Math.round(
        (totalCompleted / tasks.length)
        * 100
    )
    : 0;

    document.getElementById('efficiency')
    .innerText = efficiency + '%';

    let streaks = 0;

    tasks.forEach(task => {

        if(task.type === 'habit'){

            streaks += task.streak;

        }

    });

    document.getElementById('streaks')
    .innerText = streaks;

    calculateMoney();

}

function calculateMoney(){

    const plus =
    Number(
        document.getElementById(
            'rewardPlus'
        ).value
    );

    const minus =
    Number(
        document.getElementById(
            'rewardMinus'
        ).value
    );

    let money = 0;

    tasks.forEach(task => {

        money +=
        task.completedDates.length
        * plus;

        if(task.recurring){

            const days =
            Math.max(
                0,
                Math.floor(
                    (
                        new Date()
                        -
                        new Date(task.createdAt)
                    )
                    /
                    86400000
                )
            );

            const missed =
            days
            -
            task.completedDates.length;

            money -= missed * minus;

        }else{

            const missed =
            task.scheduledDates.length
            -
            task.completedDates.length;

            money -= missed * minus;

        }

    });

    const balance =
    document.getElementById('moneyBalance');

    balance.innerText =
    '$' + money;

    if(money >= 0){

        balance.classList.remove(
            'money-negative'
        );

        balance.classList.add(
            'money-positive'
        );

    }else{

        balance.classList.remove(
            'money-positive'
        );

        balance.classList.add(
            'money-negative'
        );

    }

}

function renderAll(){

    renderTasks();
    renderGoals();
    renderPlannedTasks();
    renderHistory();
    renderStats();

}

document.getElementById('viewDate')
.addEventListener('change', renderAll);

renderGoalOptions();
renderAll();

</script>

</body>
</html>
